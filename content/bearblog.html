<script>
  function isFromHere() {
    const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
    return timezone == "Europe/Berlin" || timezone == "Europe/Vienna";
  }

  if (!isFromHere()) {
    window.location.replace("https://icantbearit.bearblog.dev/");
  } else {
    window.location.replace("https://petrapixel.neocities.org/blog/");
  }
</script>
