<!doctype html><html lang="en"><head><title>layout base code example</title><meta content="text/html;charset=utf-8" http-equiv="Content-Type"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><script src="layout.js"></script><link href="../../favicon.ico" rel="icon" type="image/x-icon"><style>body{margin:5px;background:#fff}aside,footer,header{padding:1.75em 2em;background:#d3d3d3}nav{margin-top:.5em}nav a{display:inline-block;margin-right:.5em}main{display:flex;margin:10px 0;padding:1em;border:1px dashed gray}.my-content{margin:0 1em;padding:.5em;border:1px dotted gray}a{color:#00f}.active{font-weight:700}</style></head><body class="load-layout"><main><div class="my-content">This is the page content, and the only element in the HTML file! The header and footer and sidebars are all added via JavaScript, which means that the HTML code for them is in a singular JavaScript file instead of every HTML file.</div></main></body></html>
